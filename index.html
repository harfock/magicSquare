<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>形狀、心算與色彩都市建築師 — 榮譽勳章存檔版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-image: url('image_9.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: "PingFang HK", "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #FFFFFF; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* 頂部題目欄 */
        #target-bar { 
            position: relative;
            z-index: 50; 
            padding: 15px 15px 5px 15px; 
            text-align: center; 
            flex-shrink: 0;
        }

        #target-bar h1 { 
            font-size: 32px; 
            font-weight: 900; 
            margin-bottom: 8px; 
            text-shadow: 0 4px 12px rgba(0,0,0,0.8);
        }

        #target-display { 
            width: 95px;
            height: 95px; 
            margin: 0 auto; 
            background: rgba(0, 0, 0, 0.65); 
            padding: 12px; 
            border-radius: 20px; 
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            color: #FCD34D;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.6);
            overflow: hidden; 
        }

        #target-display svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .color-target-preview {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 3px solid #FFFFFF;
            box-shadow: 0 6px 14px rgba(0,0,0,0.6), inset 0 2px 8px rgba(255,255,255,0.5);
        }

        #dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }
        .stat-box { background: rgba(15, 23, 42, 0.75); padding: 4px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .evolution-status { color: #FCD34D; font-weight: 900; background: rgba(30, 27, 75, 0.85) !important; border-color: #FBBF24 !important;}

        /* 主遊戲容器 */
        #main-container { 
            flex: 1; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 40px 20px 40px; 
            gap: 30px;
            height: calc(100vh - 180px);
            min-height: 0; 
        }

        /* 左側操作區 */
        #play-area { 
            display: grid; 
            width: 48%; 
            height: 100%;
            background: rgba(15, 23, 42, 0.45);
            padding: 20px;
            border-radius: 32px;
            border: 2px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            align-content: stretch; 
        }

        .grid-shape-mode { 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 16px; 
        }
        
        .grid-math-mode { 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(4, 1fr); 
            gap: 12px; 
        }

        .grid-color-mode {
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 14px;
        }

        .shape-box, .num-btn { 
            width: 100%; 
            height: 100%; 
            padding: 10px; 
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.95)); 
            border-radius: 20px; 
            cursor: pointer; 
            transition: all 0.15s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            font-size: 38px; 
            font-weight: 900; 
            color: #FFFFFF;
            user-select: none;
        }
        .shape-box:hover, .num-btn:hover { transform: scale(1.02); border-color: rgba(255, 255, 255, 0.4); }
        .shape-box svg { width: 100%; height: 100%; pointer-events: none; filter: url(#3d-lighting); }

        .color-btn {
            width: 100%;
            height: 100%;
            border-radius: 22px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 8px 16px rgba(0,0,0,0.5), 
                inset 0 4px 8px rgba(255,255,255,0.6), 
                inset 0 -6px 12px rgba(0,0,0,0.3);
            user-select: none;
        }
        .color-btn:hover {
            transform: scale(1.05);
            border-color: #FFFFFF;
            box-shadow: 
                0 12px 20px rgba(0,0,0,0.6), 
                inset 0 6px 10px rgba(255,255,255,0.8), 
                inset 0 -6px 12px rgba(0,0,0,0.2);
        }

        .control-btn { background: linear-gradient(135deg, #EF4444, #B91C1C) !important; font-size: 24px !important; border-color: #F87171 !important; }
        .submit-btn { background: linear-gradient(135deg, #10B981, #047857) !important; border-color: #34D399 !important; }

        /* 右側城市地圖 */
        #construction-yard {
            width: 48%; 
            height: 100%;
            background-image: url('citymap.png'); 
            background-size: 100% 100%; 
            background-position: center center;
            background-repeat: no-repeat;
            border-radius: 32px; 
            border: 3px solid #34d399;
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #yard-title { 
            position: absolute; top: -15px; left: 25px; font-size: 18px; color: #FFFFFF; 
            font-weight: bold; letter-spacing: 1px; z-index: 30;
            background: rgba(15, 23, 42, 0.9); padding: 4px 16px; border-radius: 12px;
            border: 1px solid rgba(52, 211, 153, 0.4);
        }

        /* 👑 右上角大拇指榮譽勳章容器 */
        #badge-container {
            position: absolute;
            top: 12px;
            right: 20px;
            z-index: 40;
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            min-height: 38px;
            align-items: center;
        }

        .thumb-badge {
            font-size: 26px;
            animation: badgePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.5) forwards;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            user-select: none;
        }

        @keyframes badgePop {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            70% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        #iso-canvas-wrapper {
            width: 100%; 
            height: 100%; 
            position: relative;
            border-radius: 28px;
            overflow: hidden; 
        }

        #iso-grid {
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            grid-template-rows: repeat(4, 1fr);    
            width: 100%;
            height: 100%;
            gap: 2px; 
            background: transparent;
        }

        .grid-tile { 
            width: 100%; 
            height: 100%; 
            background: rgba(13, 18, 30, 0.96); 
            border: 1px solid rgba(52, 211, 153, 0.25); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: rgba(52, 211, 153, 0.8); 
            font-size: 13px; 
            font-weight: 800;
            transition: all 0.6s ease-out;
            opacity: 1; 
            visibility: visible;
        }

        .grid-tile.revealed { 
            opacity: 0; 
            transform: scale(0.8);
            visibility: hidden; 
            pointer-events: none;
        }

        .eliminated { pointer-events: none; animation: complexVanish 0.7s forwards; }
        @keyframes complexVanish { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0) rotate(360deg); opacity: 0; } }
        
        .shake { animation: shake 0.35s ease-in-out; border-color: #EF4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }

        /* 轉場與結算彈窗 */
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 10, 18, 0.85); display: none; 
            justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .modal-box { 
            background: linear-gradient(135deg, #0284c7, #0369a1); color: #FFFFFF; 
            padding: 30px 35px; border-radius: 24px; text-align: center; 
            width: 90%; max-width: 520px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.2); 
            border: 2px solid rgba(255,255,255,0.3);
            animation: modalPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }
        .modal-box h2 { font-size: 34px; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .modal-box p { font-size: 22px; color: #FCD34D; margin-top: 10px; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.5); line-height: 1.4; }
        
        #modal-continue-btn {
            display: none;
            margin: 20px auto 0 auto;
            padding: 12px 36px;
            font-size: 24px;
            font-weight: 900;
            color: #FFFFFF;
            background: linear-gradient(135deg, #10B981, #059669);
            border: 2px solid #34D399;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.4);
            transition: all 0.15s;
        }
        #modal-continue-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #34D399, #10B981);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="3d-lighting" x="-10%" y="-10%" width="120%" height="120%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
                <feSpecularLighting in="blur" surfaceScale="6" specularConstant="1.3" specularExponent="16" lighting-color="#ffffff" result="specular">
                    <feDistantLight azimuth="135" elevation="52" />
                </feSpecularLighting>
                <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularOut" />
                <feComposite in="SourceGraphic" in2="specularOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
            </filter>
        </defs>
    </svg>

    <div id="target-bar">
        <h1 id="game-instruction">請找出三個此形狀：</h1>
        <div id="target-display"></div>
        
        <div id="dashboard">
            <div class="stat-box">關卡: <span id="lbl-level">1</span></div>
            <div class="stat-box">得分: <span id="lbl-score">0</span></div>
            <div class="stat-box evolution-status">當前解鎖區域: <span id="lbl-stage">等待開發</span></div>
        </div>
    </div>

    <div id="main-container">
        <div id="play-area" class="grid-shape-mode"></div>
        
        <div id="construction-yard">
            <div id="yard-title">實景都市解鎖藍圖 (32區平面無縫版)</div>
            
            <div id="badge-container"></div>

            <div id="iso-canvas-wrapper">
                <div id="iso-grid"></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2 id="modal-title">區域開發完成！</h2>
            <p id="modal-desc">已成功驅散迷霧</p>
            <button id="modal-continue-btn" onclick="handleModalContinue()">繼續下一輪挑戰</button>
        </div>
    </div>

    <script>
        const SHAPE_TEMPLATES = {
            circle: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="38" fill="#FF4D4D"/></svg>`,
            square: `<svg viewBox="0 0 100 100"><rect x="15" y="15" width="70" height="70" rx="14" fill="#00D2FF"/></svg>`,
            triangle: `<svg viewBox="0 0 100 100"><polygon points="50,12 92,85 8,85" fill="#FFB000"/></svg>`,
            star: `<svg viewBox="0 0 100 100"><polygon points="50,7 64,36 96,36 70,57 81,89 50,70 19,89 30,57 4,36 36,36" fill="#10B981"/></svg>`
        };

        const COLOR_PALETTE = [
            "#FF3B30", "#FF9500", "#FFCC00", "#4CD964", 
            "#5AC8FA", "#007AFF", "#5856D6", "#FF2D55",
            "#9C27B0", "#009688", "#E91E63", "#4CAF50",
            "#FF5722", "#607D8B", "#00FFFF", "#FFFF00"
        ];

        const SHAPE_TYPES = ['circle', 'square', 'triangle', 'star'];
        
        let currentTargetShape = '';
        let currentTargetColor = '';
        let mathAnswer = 0;
        let playerInputStr = "";
        
        let clickedCorrectCount = 0;
        let gameScore = 0;
        let currentLevel = 1;
        let objectsBuiltCount = 0; 

        const BUILD_SEQUENCE = [
            { name: '01. 西南側外環快速公路' }, { name: '02. 西南沿線綠化林蔭道' },
            { name: '03. 西側運河親水景觀走廊' }, { name: '04. 運河西岸低密住宅群' },
            { name: '05. 西北花園別墅住宅特區' }, { name: '06. 西北社區醫療康養中心' },
            { name: '07. 北側沿河生態休閒綠帶' }, { name: '08. 北岸濱河運動文化公園' },
            { name: '09. 南側濱海景觀聯絡公路' }, { name: '10. 南灣觀海高層藍籌學府' },
            { name: '11. 東東南智慧科技產業園區' }, { name: '12. 東南新創研發總部大樓' },
            { name: '13. 東區現代高鐵樞紐中轉站' }, { name: '14. 東側商務甲級辦公大廈' },
            { name: '15. 東北新興智慧住宅社區' }, { name: '16. 東北大型文體購物中心' },
            { name: '17. 西區跨河生態景觀大橋' }, { name: '18. 城市軌道交通西線輕軌' },
            { name: '19. 內環立體高架聯絡車道' }, { name: '20. 市中心環狀生態輕軌線' },
            { name: '21. 中央核心地下交通網絡' }, { name: '22. 市政政務聯合辦公大樓' },
            { name: '23. 璀璨時尚步行購物街區' }, { name: '24. 國際藝術劇院與音樂廳' },
            { name: '25. 中軸雙噴泉歷史紀念廣場' }, { name: '26. 城市中央晶鑽玻璃展覽館' },
            { name: '27. 核心商圈帝國聯邦大廈' }, { name: '28. 國際金融中心超高摩天樓' },
            { name: '29. 全球貿易財富晶鑽主塔' }, { name: '30. 超五星璀璨雲端觀景酒店' },
            { name: '31. 跨世紀巨型地標璀璨雙子星' }, { name: '32. 繁榮璀璨全景大都市落成' }
        ];

        // 👑 從本機快取載入歷史通關大拇指數量
        function renderThumbBadges() {
            const container = document.getElementById('badge-container');
            if (!container) return;
            
            let savedLoops = parseInt(localStorage.getItem('completed_loops')) || 0;
            container.innerHTML = '';
            
            // 根據通關次數印出對應數量的大拇指
            for(let i = 0; i < savedLoops; i++) {
                const thumb = document.createElement('span');
                thumb.className = 'thumb-badge';
                thumb.textContent = '👍';
                container.appendChild(thumb);
            }
        }

        function createBaseMesh() {
            const grid = document.getElementById('iso-grid');
            if (!grid) return;
            grid.innerHTML = '';
            for (let i = 0; i < 32; i++) {
                const tile = document.createElement('div');
                tile.className = 'grid-tile';
                tile.id = `tile-${i}`;
                tile.textContent = `${i + 1}`;
                grid.appendChild(tile);
            }
        }

        function getRoundMode(level) {
            let pos = (level - 1) % 9 + 1;
            if (pos <= 3) return 'SHAPE'; 
            if (pos <= 6) return 'MATH';  
            return 'COLOR';               
        }

        function initGame() {
            const playArea = document.getElementById('play-area');
            const targetDisplay = document.getElementById('target-display');
            const instruction = document.getElementById('game-instruction');
            if (!playArea || !targetDisplay) return;

            document.getElementById('lbl-level').textContent = currentLevel;
            document.getElementById('lbl-score').textContent = gameScore;
            
            let stageIndex = Math.min(objectsBuiltCount, BUILD_SEQUENCE.length - 1);
            document.getElementById('lbl-stage').textContent = BUILD_SEQUENCE[stageIndex].name;

            let mode = getRoundMode(currentLevel);

            if (mode === 'SHAPE') {
                instruction.textContent = "請找出三個此形狀：";
                playArea.className = "grid-shape-mode"; 
                playArea.innerHTML = '';
                clickedCorrectCount = 0;

                currentTargetShape = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
                targetDisplay.innerHTML = SHAPE_TEMPLATES[currentTargetShape];

                let spawnPool = [];
                for (let i = 0; i < 3; i++) { spawnPool.push({ type: currentTargetShape, isTarget: true }); }
                const wrongTypes = SHAPE_TYPES.filter(type => type !== currentTargetShape);
                for (let i = 0; i < 9; i++) {
                    const randomWrongType = wrongTypes[Math.floor(Math.random() * wrongTypes.length)];
                    spawnPool.push({ type: randomWrongType, isTarget: false });
                }

                for (let i = spawnPool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [spawnPool[i], spawnPool[j]] = [spawnPool[j], spawnPool[i]];
                }

                spawnPool.forEach((item) => {
                    const box = document.createElement('div');
                    box.className = 'shape-box';
                    box.innerHTML = SHAPE_TEMPLATES[item.type];
                    box.onclick = () => handleItemClick(box, item.isTarget, 150);
                    playArea.appendChild(box);
                });

            } else if (mode === 'MATH') {
                instruction.textContent = "大腦活化心算！請輸入正確答案：";
                playArea.className = "grid-math-mode"; 
                playerInputStr = "";
                targetDisplay.textContent = "?";

                let mathType = Math.floor(Math.random() * 3); 
                let questionText = "";

                if (mathType === 0) {
                    let num1 = Math.floor(Math.random() * 40) + 15;
                    let num2 = Math.floor(Math.random() * 40) + 15;
                    mathAnswer = num1 + num2;
                    questionText = `${num1} + ${num2}`;
                } else if (mathType === 1) {
                    let singleNum = Math.floor(Math.random() * 8) + 2;
                    mathAnswer = singleNum * 11;
                    questionText = `${singleNum} × 11`;
                } else {
                    let evenNum = (Math.floor(Math.random() * 40) + 10) * 2;
                    mathAnswer = evenNum / 2;
                    questionText = `${evenNum} ÷ 2`;
                }

                instruction.textContent = `心算風暴： ${questionText} = 多少？`;

                playArea.innerHTML = '';
                for (let i = 1; i <= 9; i++) { createNumButton(i); }
                
                const clearBtn = document.createElement('div');
                clearBtn.className = 'num-btn control-btn';
                clearBtn.textContent = '清除';
                clearBtn.onclick = () => { playerInputStr = ""; targetDisplay.textContent = "?"; };
                playArea.appendChild(clearBtn);

                createNumButton(0);

                const submitBtn = document.createElement('div');
                submitBtn.className = 'num-btn control-btn submit-btn';
                submitBtn.textContent = '確認';
                submitBtn.onclick = () => handleMathSubmit();
                playArea.appendChild(submitBtn);

            } else if (mode === 'COLOR') {
                instruction.textContent = "活化色彩感知！請找出三個此顏色：";
                playArea.className = "grid-color-mode"; 
                playArea.innerHTML = '';
                clickedCorrectCount = 0;

                currentTargetColor = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
                targetDisplay.innerHTML = `<div class="color-target-preview" style="background-color: ${currentTargetColor}"></div>`;

                let spawnPool = [];
                for (let i = 0; i < 3; i++) { spawnPool.push({ color: currentTargetColor, isTarget: true }); }
                
                const wrongColors = COLOR_PALETTE.filter(c => c !== currentTargetColor);
                for (let i = 0; i < 13; i++) {
                    const randomWrongColor = wrongColors[i % wrongColors.length];
                    spawnPool.push({ color: randomWrongColor, isTarget: false });
                }

                for (let i = spawnPool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [spawnPool[i], spawnPool[j]] = [spawnPool[j], spawnPool[i]];
                }

                spawnPool.forEach((item) => {
                    const btn = document.createElement('div');
                    btn.className = 'color-btn';
                    btn.style.backgroundColor = item.color; 
                    btn.onclick = () => handleItemClick(btn, item.isTarget, 200); 
                    playArea.appendChild(btn);
                });
            }
        }

        function createNumButton(num) {
            const playArea = document.getElementById('play-area');
            const btn = document.createElement('div');
            btn.className = 'num-btn';
            btn.textContent = num;
            btn.onclick = () => {
                if (playerInputStr.length < 4) {
                    playerInputStr += num;
                    document.getElementById('target-display').textContent = playerInputStr;
                }
            };
            playArea.appendChild(btn);
        }

        function handleItemClick(element, isTarget, scoreReward) {
            if (element.classList.contains('eliminated') || element.classList.contains('shake')) return;

            if (isTarget) {
                element.classList.add('eliminated');
                clickedCorrectCount++;
                gameScore += scoreReward;
                document.getElementById('lbl-score').textContent = gameScore;

                if (clickedCorrectCount === 3) { processRoundSuccess(); }
            } else {
                element.classList.add('shake');
                setTimeout(() => element.classList.remove('shake'), 350);
            }
        }

        function handleMathSubmit() {
            let parsedInput = parseInt(playerInputStr);
            if (parsedInput === mathAnswer) {
                gameScore += 250;
                processRoundSuccess();
            } else {
                const playArea = document.getElementById('play-area');
                playArea.classList.add('shake');
                playerInputStr = "";
                document.getElementById('target-display').textContent = "❌";
                setTimeout(() => {
                    playArea.classList.remove('shake');
                    document.getElementById('target-display').textContent = "?";
                }, 600);
            }
        }

        function processRoundSuccess() {
            objectsBuiltCount++; 
            currentLevel++;
            
            revealCityMask(); 
            
            setTimeout(() => {
                triggerTransitionModal();
            }, 500);
        }

        function revealCityMask() {
            let tileIndex = objectsBuiltCount - 1;
            let targetTile = document.getElementById(`tile-${tileIndex}`);
            if (targetTile) {
                targetTile.classList.add('revealed');
            }
        }

        function triggerTransitionModal() {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const desc = document.getElementById('modal-desc');
            const continueBtn = document.getElementById('modal-continue-btn');
            if(!overlay || !title || !desc || !continueBtn) return;

            // 👑 當完成 32 關的倍數（32, 64, 96...）時觸發結算
            if ((currentLevel - 1) % 32 === 0) {
                let currentLoopCount = (currentLevel - 1) / 32;
                
                title.textContent = `🎉 恭喜完成第 ${currentLoopCount} 輪大滿貫！`;
                desc.innerHTML = `您已成功解鎖整座繁華都市！<br>獲得榮譽大拇指 👍 勳章一枚！<br>表現得太出色了，請先閉眼休息一下。`;
                
                // 👑 將最新累計的輪次寫入本機快取
                localStorage.setItem('completed_loops', currentLoopCount);
                // 同步刷新右上角的大拇指展示
                renderThumbBadges();

                continueBtn.style.display = 'block';
                overlay.style.display = 'flex';
            } else {
                let tileIndex = Math.min(objectsBuiltCount - 1, BUILD_SEQUENCE.length - 1);
                let latestBuildName = BUILD_SEQUENCE[tileIndex].name;
                let prevMode = getRoundMode(currentLevel - 1);

                if (prevMode === 'MATH') {
                    title.textContent = `🧠 大腦速算成功！`;
                } else if (prevMode === 'COLOR') {
                    title.textContent = `🎨 色彩辨識成功！`;
                } else {
                    title.textContent = `🧱 視覺消除成功！`;
                }
                
                desc.textContent = `解鎖迷霧：${latestBuildName}`;
                continueBtn.style.display = 'none'; 
                overlay.style.display = 'flex';
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    initGame();
                }, 1800);
            }
        }

        function handleModalContinue() {
            const overlay = document.getElementById('modal-overlay');
            const continueBtn = document.getElementById('modal-continue-btn');
            
            overlay.style.display = 'none';
            continueBtn.style.display = 'none';

            // 重置迷霧進度，重新蓋上 32 格黑盒子
            objectsBuiltCount = 0; 
            createBaseMesh(); 
            
            initGame();
        }

        window.onload = () => {
            createBaseMesh();
            renderThumbBadges(); // 👑 頁面開啟時自動載入快取中的大拇指
            initGame();
        };
    </script>
</body>
</html>
