<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>形狀、心算與色彩幻獸萌寵探索之旅</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <canvas id="bubble-canvas"></canvas>
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="3d-lighting" x="-10%" y="-10%" width="120%" height="120%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
                <feSpecularLighting in="blur" surfaceScale="6" specularConstant="1.3" specularExponent="16" lighting-color="#ffffff" result="specular">
                    <feDistantLight azimuth="135" elevation="52" />
                </feSpecularLighting>
                <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularOut" />
                <feComposite in="SourceGraphic" in2="specularOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
            </filter>
        </defs>
    </svg>

    <div id="neon-trail-container"></div>

    <div id="target-bar">
        <div id="target-left-side">
            <h1 id="game-instruction">載入中...</h1>
            <div id="target-display"></div>
        </div>
        
        <div id="target-right-side">
            <div id="top-badge-container"></div>
            <div id="dashboard-carousel">
                <span id="carousel-text">載入中...</span>
            </div>
        </div>
    </div>

    <div id="main-container">
        <div id="play-area" class="grid-shape-mode"></div>
        
        <div id="construction-yard">
            <div id="yard-title">探索藍圖</div>
            <div id="iso-canvas-wrapper">
                <div id="iso-grid"></div>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2 id="modal-title">區域開發完成！</h2>
            <p id="modal-desc">已成功驅散迷霧</p>
            <button id="modal-continue-btn">繼續下一輪挑戰</button>
        </div>
    </div>

    <div id="gallery-popup">
        <div class="gallery-content">
            <img id="gallery-img" src="" alt="解鎖地圖">
            <div id="gallery-text-title" class="gallery-title">解鎖地圖</div>
            <div class="gallery-tip">( 點選畫面的任意地方即可關閉此視窗 )</div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
